<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TwinTrack — You're offline</title>
  <meta name="theme-color" content="#da5a9f" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #fdf8fa;
      font-family: 'Quicksand', sans-serif;
      color: #1a4a50;
    }
    .container {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      gap: 16px;
      max-width: 430px;
      margin: 0 auto;
    }
    .emoji { font-size: 64px; line-height: 1; margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 700; color: #1a4a50; }
    p { font-size: 15px; color: #6b9ea5; line-height: 1.6; max-width: 280px; }
    .tip {
      background: white;
      border: 1px solid #e8d5e4;
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 13px;
      color: #6b9ea5;
      line-height: 1.5;
    }
    button {
      background: #da5a9f;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      font-family: 'Quicksand', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      min-width: 160px;
    }
    button:active { opacity: 0.85; transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { font-size: 13px; color: #6b9ea5; min-height: 18px; }
    .reconnecting { color: #da5a9f; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🍒</div>
    <h1>You're offline right now</h1>
    <p>No worries — even the most organised twin parents lose their signal sometimes.</p>
    <div class="tip">
      TwinTrack works offline for reading. Once you're back online, everything syncs automatically. 💕
    </div>
    <p id="status"></p>
    <button id="retry-btn" onclick="tryAgain()">Try again</button>
  </div>

  <script>
    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls || '';
    }

    // Manual retry: clear the stuck service worker state then go home.
    // Always navigates to / (the root) — guaranteed to exist on the server.
    async function tryAgain() {
      var btn = document.getElementById('retry-btn');
      btn.disabled = true;
      setStatus('Reconnecting…', 'reconnecting');

      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function(r) { return r.unregister(); }));
        }
        if ('caches' in window) {
          var names = await caches.keys();
          await Promise.all(names.map(function(n) { return caches.delete(n); }));
        }
      } catch(e) {
        // Non-fatal — still navigate
      }

      // Always go to root so the server always has a file to serve
      window.location.replace('/?_cb=' + Date.now());
    }

    // Auto-redirect only when the browser fires the online event —
    // NOT immediately on page load (that caused the blank screen bug).
    window.addEventListener('online', function() {
      setStatus('Back online! Loading…', 'reconnecting');
      // Simple redirect without cache-clearing — just go home.
      // The service worker will serve fresh assets normally.
      setTimeout(function() {
        window.location.replace('/');
      }, 800);
    });

    // If already online when this page loads (e.g. stale SW served it by mistake),
    // wait a beat then redirect home — no cache-clearing needed.
    if (navigator.onLine) {
      setTimeout(function() {
        window.location.replace('/');
      }, 1500);
    }
  </script>
</body>
</html>
