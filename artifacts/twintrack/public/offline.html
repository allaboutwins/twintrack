<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TwinTrack — You're offline</title>
  <meta name="theme-color" content="#da5a9f" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #fdf8fa;
      font-family: 'Quicksand', sans-serif;
      color: #1a4a50;
    }
    .container {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      gap: 16px;
      max-width: 430px;
      margin: 0 auto;
    }
    .emoji { font-size: 64px; line-height: 1; margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 700; color: #1a4a50; }
    p { font-size: 15px; color: #6b9ea5; line-height: 1.6; max-width: 280px; }
    .tip {
      margin-top: 8px;
      background: white;
      border: 1px solid #e8d5e4;
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 13px;
      color: #6b9ea5;
      line-height: 1.5;
    }
    button {
      margin-top: 8px;
      background: #da5a9f;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      font-family: 'Quicksand', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      min-width: 160px;
    }
    button:active { opacity: 0.85; transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status {
      font-size: 13px;
      color: #6b9ea5;
      min-height: 20px;
    }
    .reconnecting { color: #da5a9f; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🍒</div>
    <h1>You're offline right now</h1>
    <p>No worries — even the most organised twin parents lose their signal sometimes.</p>
    <div class="tip">
      TwinTrack works offline for reading. Once you're back online, everything syncs automatically. 💕
    </div>
    <p id="status"></p>
    <button id="retry-btn" onclick="tryAgain()">Try again</button>
  </div>

  <script>
    // Destination after recovery — default to /dashboard
    var returnTo = (location.search.match(/[?&]returnTo=([^&]*)/) || [])[1] || '/dashboard';

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls || '';
    }

    // Full escape hatch: unregister the service worker + clear all caches, then hard-navigate.
    // This breaks the SW intercept loop so a stuck user always gets unstuck.
    async function tryAgain() {
      var btn = document.getElementById('retry-btn');
      btn.disabled = true;
      setStatus('Reconnecting…', 'reconnecting');

      try {
        // 1. Unregister every service worker for this origin
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function(r) { return r.unregister(); }));
        }

        // 2. Wipe all caches so a stale app shell can't cause a blank screen
        if ('caches' in window) {
          var names = await caches.keys();
          await Promise.all(names.map(function(n) { return caches.delete(n); }));
        }
      } catch(e) {
        // Non-fatal — still attempt the reload
      }

      // 3. Hard navigate (not reload) — bypasses any remaining SW interception
      //    Cache-busting query string ensures the server is actually reached
      window.location.replace(returnTo + (returnTo.includes('?') ? '&' : '?') + '_cb=' + Date.now());
    }

    // Auto-redirect as soon as connectivity is confirmed
    async function checkOnline() {
      if (!navigator.onLine) return;
      try {
        // Probe the origin directly — HEAD is cheap, no-store bypasses SW cache
        await fetch(location.origin + '/favicon.svg', { method: 'HEAD', cache: 'no-store' });
        // Connectivity confirmed — go home
        setStatus('Back online! Redirecting…', 'reconnecting');
        await tryAgain();
      } catch(e) {
        // Still can't reach the server — stay on this page
      }
    }

    // Check immediately on load (handles: user was never truly offline,
    // just a stale SW; or connectivity returned before this page loaded)
    checkOnline();

    // Also check whenever the browser fires the online event
    window.addEventListener('online', checkOnline);

    // Poll every 5 seconds as a fallback (some browsers/carriers are slow to fire online)
    setInterval(checkOnline, 5000);
  </script>
</body>
</html>
