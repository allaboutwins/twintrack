<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TwinTrack — The Twin Parenting App</title>
    <meta name="description" content="TwinTrack helps twin parents track sleep, feeding, diapers, and routines for both babies — calmly, simply, together." />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#da5a9f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TwinTrack" />
    <meta name="application-name" content="TwinTrack" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Apple Splash Screens (portrait) -->
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Social -->
    <meta property="og:title" content="TwinTrack — The Twin Parenting App by @AllAboutTwins" />
    <meta property="og:description" content="The app that finally understands twin life. Track sleep, feeding, diapers &amp; milestones for both babies — calmly, simply, together. Made for twin moms, by twin moms. 🍒" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TwinTrack" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@allaboutwins" />
    <meta name="twitter:creator" content="@allaboutwins" />
    <meta name="twitter:title" content="TwinTrack — The Twin Parenting App" />
    <meta name="twitter:description" content="Track sleep, feeding, diapers &amp; milestones for both twins — calmly, simply, together. 💕 Made for twin moms by @allaboutwins." />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://app.allaboutwins.com/" />
    <meta name="keywords" content="twin parenting app, twins tracker, sleep tracker twins, feeding tracker twins, twin mom app, multiples parenting" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Inline splash styles: branded background before React loads -->
    <style>
      html, body { background-color: #fdf8fa; margin: 0; padding: 0; }
    </style>

    <script>
    (function() {
      'use strict';

      /* ─── 1. Telemetry ─────────────────────────────────────────────────────
         Sends crash reports to the server BEFORE React loads.
         Uses sendBeacon (fire-and-forget, survives page unload) with fetch as
         fallback. All fields are clamped to avoid oversized payloads.        */

      function _ttReport(payload) {
        try {
          payload.userAgent = (navigator.userAgent || '').slice(0, 500);
          payload.url       = (window.location.href || '').slice(0, 300);
          payload.ts        = Date.now();
          var body = JSON.stringify(payload);
          var url  = '/api/client-errors';
          if (navigator.sendBeacon) {
            navigator.sendBeacon(url, new Blob([body], { type: 'application/json' }));
          } else {
            fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body, keepalive: true }).catch(function(){});
          }
        } catch(e) { /* never crash the crash reporter */ }
      }

      /* ─── 2. Global JS error capture ──────────────────────────────────────
         Catches synchronous errors that escape all try/catch blocks.         */
      window.onerror = function(msg, src, line, col, err) {
        _ttReport({
          type:    'window.onerror',
          message: String(msg || '').slice(0, 500),
          source:  String(src  || '').slice(0, 200),
          line:    line,
          col:     col,
          stack:   (err && err.stack) ? err.stack.slice(0, 2000) : '',
        });
        return false; // don't suppress default console output
      };

      /* ─── 3. Unhandled promise rejection capture ───────────────────────────
         Catches dynamic import() failures and uncaught async errors.
         Also triggers stale-cache recovery for chunk 404s.                  */
      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason || {};
        var msg = (reason.message || String(reason) || '').slice(0, 500);
        _ttReport({
          type:    'unhandledrejection',
          message: msg,
          stack:   (reason.stack || '').slice(0, 2000),
        });
        // Stale-chunk recovery
        if (
          msg.includes('dynamically imported module') ||
          msg.includes('Failed to fetch') ||
          msg.includes('Importing a module script failed') ||
          msg.includes('Loading chunk') ||
          msg.includes('error loading')
        ) {
          _ttCacheBust();
        }
      });

      /* ─── 4. Script/link resource 404 capture ──────────────────────────── */
      window.addEventListener('error', function(e) {
        var target = e.target;
        var src = (target && (target.src || target.href)) || '';
        var isChunk = src && (src.includes('/assets/') || /\.[0-9a-f]{8}\.(js|css)$/.test(src));
        if (isChunk) {
          _ttReport({ type: 'resource_404', message: 'Chunk 404: ' + src.slice(0, 200) });
          _ttCacheBust();
        }
      }, true);

      /* ─── 5. Stale-cache bust ──────────────────────────────────────────────
         Wipes SW registrations + all caches then reloads once per session.  */
      function _ttCacheBust() {
        if (sessionStorage.getItem('tt_cache_bust')) return;
        sessionStorage.setItem('tt_cache_bust', '1');
        _ttReport({ type: 'cache_bust', message: 'Triggering stale-cache recovery' });
        (async function() {
          try {
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function(r) { return r.unregister(); }));
            }
            if ('caches' in window) {
              var names = await caches.keys();
              await Promise.all(names.map(function(n) { return caches.delete(n); }));
            }
          } finally {
            window.location.replace(window.location.pathname + '?_cb=' + Date.now());
          }
        })();
      }

      /* ─── 6. Persistent blank-screen detector ─────────────────────────────
         The old one-shot 5-second timer had a fatal race: if #root had the
         loading spinner at t=5s (it almost always does), the timer exited.
         Then the real crash happened at t=6-8s and NOTHING recovered it.

         Fix: use MutationObserver + periodic poll so we detect the moment
         #root becomes empty AFTER having content — which is exactly the
         "crash after first render" signature on Android.                     */

      var _ttHadContent  = false;
      var _ttRecovered   = false;
      var _ttStartMs     = Date.now();

      function _ttShowRecovery(reason) {
        if (_ttRecovered) return;
        _ttRecovered = true;
        _ttReport({ type: 'blank_screen_recovery', message: reason || 'blank screen detected' });
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = [
          '<div id="tt-recovery" style="position:fixed;inset:0;display:flex;flex-direction:column;',
          'align-items:center;justify-content:center;background:#fdf8fa;',
          'font-family:Quicksand,sans-serif;text-align:center;padding:32px;box-sizing:border-box;">',
          '<div style="font-size:52px;margin-bottom:20px;">🍒</div>',
          '<p style="font-size:19px;font-weight:700;color:#1a4a50;margin:0 0 10px;">',
          'TwinTrack couldn\'t load</p>',
          '<p style="font-size:14px;color:#6b9ea5;margin:0 0 8px;max-width:290px;line-height:1.6;">',
          'This can happen after an update or in certain browsers.</p>',
          '<p style="font-size:12px;color:#b0b0b0;margin:0 0 28px;max-width:290px;line-height:1.5;">',
          reason ? ('(' + reason.slice(0, 80) + ')') : '', '</p>',
          '<button onclick="(function(){',
            'sessionStorage.clear();',
            'if(\'serviceWorker\'in navigator)navigator.serviceWorker.getRegistrations()',
              '.then(function(r){r.forEach(function(x){x.unregister();});});',
            'if(\'caches\'in window)caches.keys()',
              '.then(function(k){k.forEach(function(c){caches.delete(c);});});',
            'setTimeout(function(){window.location.reload(true);},400);',
          '})()" ',
          'style="background:#da5a9f;color:white;border:none;padding:16px 40px;',
          'border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;',
          'font-family:Quicksand,sans-serif;box-shadow:0 4px 20px rgba(218,90,159,0.35);">',
          'Reload TwinTrack</button>',
          '<p style="font-size:12px;color:#b0b0b0;margin-top:24px;">',
          'Still stuck? Open this link in Chrome or Safari.</p>',
          '</div>',
        ].join('');
      }

      function _ttCheck() {
        if (_ttRecovered) return;
        var root = document.getElementById('root');
        if (!root) return;
        if (root.children.length > 0) {
          _ttHadContent = true;
          return; // content present — all good
        }
        var elapsed = Date.now() - _ttStartMs;
        if (_ttHadContent) {
          // Had content, now empty → crash after first render
          _ttShowRecovery('app crashed after first render (elapsed: ' + elapsed + 'ms)');
        } else if (elapsed > 10000) {
          // Never got content in 10 seconds
          _ttShowRecovery('app never rendered after ' + elapsed + 'ms');
        }
      }

      // Poll every 500ms — cheap, catches crashes between Observer callbacks
      setInterval(_ttCheck, 500);

      // MutationObserver for immediate detection when content disappears
      try {
        var root = document.getElementById('root');
        if (root && window.MutationObserver) {
          new MutationObserver(_ttCheck).observe(root, { childList: true });
        }
      } catch(e) {}

    })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
