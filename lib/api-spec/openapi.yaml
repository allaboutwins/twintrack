              $ref: "#/components/schemas/PollResults"

    RespondToPollBody:
      type: object
      required: [userId, optionKey]
      properties:
        userId:
          type: string
        optionKey:
          type: string

    BackfillResult:
      type: object
      required: [success, failed, skipped]
      properties:
        success:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string

    AppUpdate:
      type: object
      required: [id, title, description, emoji, publishedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        emoji:
          type: string
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    AppUpdateCreateRequest:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 500
        emoji:
          type: string
        publishedAt:
          type: string
          format: date-time

    TwinAiMessageFeedbackRequest:
      type: object
      required: [helpful]
      properties:
        helpful:
          type: boolean

    TwinAiAnalytics:
      type: object
      required: [totalMessages, todayMessages, uniqueUsers, avgPerUser, helpfulCount, notHelpfulCount, categoryBreakdown, topQuestions, dailyUsage]
      properties:
        totalMessages:
          type: integer
        todayMessages:
          type: integer
        uniqueUsers:
          type: integer
        avgPerUser:
          type: number
        helpfulCount:
          type: integer
        notHelpfulCount:
          type: integer
        categoryBreakdown:
          type: array
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
              value:
                type: integer
        topQuestions:
          type: array
          items:
            type: object
            required: [question, count]
            properties:
              question:
                type: string
              count:
                type: integer
        dailyUsage:
          type: array
          items:
            type: object
            required: [date, count]
            properties:
              date:
                type: string
              count:
                type: integer

    TwinAiMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          description: "user or assistant"
        content:
          type: string

    TwinAiChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/TwinAiMessage"
          minItems: 1

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
