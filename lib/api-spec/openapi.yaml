openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TwinTrack API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: twin-ai
    description: Twin AI chat assistant operations
  - name: health
    description: Health operations
  - name: twins
    description: Twin profile operations
  - name: sleep
    description: Sleep tracking operations
  - name: feeding
    description: Feeding tracking operations
  - name: diapers
    description: Diaper tracking operations
  - name: bath
    description: Bath tracking operations
  - name: routines
    description: Routine template operations
  - name: videos
    description: Twin TV video library operations
  - name: milestones
    description: Twin milestone tracking operations
  - name: dashboard
    description: Dashboard summary operations
  - name: onboarding
    description: User onboarding and early access flow
  - name: feedback
    description: In-app feedback collection
  - name: polls
    description: Community polls for twin moms
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: admin
    description: Admin-only operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- TWIN PROFILES ---
  /twins:
    get:
      operationId: listTwins
      tags: [twins]
      summary: List all twin profiles for the current user
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of twin profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Twin"
    post:
      operationId: createTwin
      tags: [twins]
      summary: Create a new twin profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTwinBody"
      responses:
        "201":
          description: Created twin profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Twin"

  /twins/{id}:
    get:
      operationId: getTwin
      tags: [twins]
      summary: Get a twin profile by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Twin profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Twin"
        "404":
          description: Not found
    patch:
      operationId: updateTwin
      tags: [twins]
      summary: Update a twin profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTwinBody"
      responses:
        "200":
          description: Updated twin profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Twin"
        "404":
          description: Not found
    delete:
      operationId: deleteTwin
      tags: [twins]
      summary: Delete a twin profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- SLEEP TRACKING ---
  /sleep:
    get:
      operationId: listSleepEntries
      tags: [sleep]
      summary: List sleep entries for a twin
      parameters:
        - in: query
          name: twinId
          required: true
          schema:
            type: integer
        - in: query
          name: date
          required: false
          schema:
            type: ["string", "null"]
            description: ISO date string (YYYY-MM-DD), omit for all entries
      responses:
        "200":
          description: List of sleep entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SleepEntry"
    post:
      operationId: createSleepEntry
      tags: [sleep]
      summary: Create a new sleep entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSleepEntryBody"
      responses:
        "201":
          description: Created sleep entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepEntry"

  /sleep/{id}:
    patch:
      operationId: updateSleepEntry
      tags: [sleep]
      summary: Update a sleep entry (e.g. stop timer, add end time)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSleepEntryBody"
      responses:
        "200":
          description: Updated sleep entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepEntry"
        "404":
          description: Not found
    delete:
      operationId: deleteSleepEntry
      tags: [sleep]
      summary: Delete a sleep entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sleep/summary:
    get:
      operationId: getSleepSummary
      tags: [sleep]
      summary: Get daily and weekly sleep summary for a twin
      parameters:
        - in: query
          name: twinId
          required: true
          schema:
            type: integer
        - in: query
          name: date
          required: true
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD)
      responses:
        "200":
          description: Sleep summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepSummary"

  # --- FEEDING TRACKING ---
  /feeding:
    get:
      operationId: listFeedingEntries
      tags: [feeding]
      summary: List feeding entries for a twin
      parameters:
        - in: query
          name: twinId
          required: true
          schema:
            type: integer
        - in: query
          name: date
          required: false
          schema:
            type: ["string", "null"]
        - in: query
          name: timezone
          required: false
          schema:
            type: ["string", "null"]
          description: "IANA timezone name e.g. America/New_York"
      responses:
        "200":
          description: List of feeding entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedingEntry"
    post:
      operationId: createFeedingEntry
      tags: [feeding]
      summary: Create a new feeding entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedingEntryBody"
      responses:
        "201":
          description: Created feeding entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedingEntry"

  /feeding/{id}:
    patch:
      operationId: updateFeedingEntry
      tags: [feeding]
      summary: Update a feeding entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeedingEntryBody"
      responses:
        "200":
          description: Updated feeding entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedingEntry"
        "404":
          description: Not found
    delete:
      operationId: deleteFeedingEntry
      tags: [feeding]
      summary: Delete a feeding entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /feeding/summary:
    get:
      operationId: getFeedingSummary
      tags: [feeding]
      summary: Get daily feeding summary for a twin
      parameters:
        - in: query
          name: twinId
          required: true
          schema:
            type: integer
        - in: query
          name: date
          required: true
          schema:
            type: string
        - in: query
          name: timezone
          required: false
          schema:
            type: ["string", "null"]
          description: "IANA timezone name e.g. America/New_York"
      responses:
        "200":
          description: Feeding summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedingSummary"

  # --- FOODS INTRODUCED ---
  /foods-introduced:
    get:
      operationId: listFoodsIntroduced
      tags: [feeding]
      summary: List foods introduced for a twin
      parameters:
        - in: query
          name: twinId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of foods introduced
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodIntroduced"
    post:
      operationId: createFoodIntroduced
      tags: [feeding]
      summary: Log a new food introduction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFoodIntroducedBody"
      responses:
        "201":
          description: Created food introduction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodIntroduced"

  /foods-introduced/{id}:
    delete:
      operationId: deleteFoodIntroduced
      tags: [feeding]
      summary: Delete a food introduction record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- DIAPER TRACKING ---
  /diapers:
    get:
      operationId: listDiaperEntries
      tags: [diapers]
      summary: List diaper entries for a twin
      parameters:
        - in: query
          name: twinId
          required: true
          schema:
            type: integer
        - in: query
          name: date
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of diaper entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiaperEntry"
    post:
      operationId: createDiaperEntry
      tags: [diapers]
      summary: Log a diaper change
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiaperEntryBody"
      responses:
        "201":
          description: Created diaper entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaperEntry"

  /diapers/{id}:
    patch:
      operationId: updateDiaperEntry
      tags: [diapers]
      summary: Update a diaper entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDiaperEntryBody"
      responses:
        "200":
          description: Updated diaper entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaperEntry"
    delete:
      operationId: deleteDiaperEntry
      tags: [diapers]
      summary: Delete a diaper entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- ROUTINES ---
  /bath:
    get:
      operationId: listBathEntries
      tags: [bath]
      summary: List bath entries for a twin
      parameters:
        - in: query
          name: twinId
          required: true
          schema:
            type: integer
        - in: query
          name: date
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of bath entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BathEntry"
    post:
      operationId: createBathEntry
      tags: [bath]
      summary: Log a bath
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBathEntryBody"
      responses:
        "201":
          description: Created bath entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BathEntry"

  /bath/{id}:
    delete:
      operationId: deleteBathEntry
      tags: [bath]
      summary: Delete a bath entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routines:
    get:
      operationId: listRoutines
      tags: [routines]
      summary: List routines for a user
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of routines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Routine"
    post:
      operationId: createRoutine
      tags: [routines]
      summary: Create a new routine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoutineBody"
      responses:
        "201":
          description: Created routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"

  /routines/{id}:
    get:
      operationId: getRoutine
      tags: [routines]
      summary: Get a routine by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found
    patch:
      operationId: updateRoutine
      tags: [routines]
      summary: Update a routine
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoutineBody"
      responses:
        "200":
          description: Updated routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found
    delete:
      operationId: deleteRoutine
      tags: [routines]
      summary: Delete a routine
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routines/{id}/tasks/{taskId}:
    patch:
      operationId: updateRoutineTask
      tags: [routines]
      summary: Toggle completion of a routine task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: taskId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoutineTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineTask"
        "404":
          description: Not found

  # --- VIDEOS ---
  /videos:
    get:
      operationId: listVideos
      tags: [videos]
      summary: List all videos in the library
      parameters:
        - in: query
          name: category
          required: false
          schema:
            type: ["string", "null"]
        - in: query
          name: search
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
    post:
      operationId: createVideo
      tags: [videos]
      summary: Add a video to the library (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVideoBody"
      responses:
        "201":
          description: Created video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"

  /videos/{id}:
    get:
      operationId: getVideo
      tags: [videos]
      summary: Get a video by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "404":
          description: Not found

  /videos/{id}/bookmark:
    post:
      operationId: bookmarkVideo
      tags: [videos]
      summary: Bookmark a video
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookmarkVideoBody"
      responses:
        "200":
          description: Bookmark toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResult"

  /videos/bookmarks:
    get:
      operationId: listBookmarkedVideos
      tags: [videos]
      summary: List bookmarked videos for a user
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bookmarked videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /videos/{id}/notes:
    get:
      operationId: listVideoNotes
      tags: [videos]
      summary: Get notes for a video by a user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VideoNote"
    post:
      operationId: upsertVideoNote
      tags: [videos]
      summary: Create or update a personal note on a video
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertVideoNoteBody"
      responses:
        "200":
          description: Note saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoNote"

  # --- MILESTONES ---
  /milestones:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List milestones for a user (optionally filtered by twin)
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
        - in: query
          name: twinId
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Milestones list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Log a new milestone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneBody"
      responses:
        "201":
          description: Milestone created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /milestones/{id}:
    delete:
      operationId: deleteMilestone
      tags: [milestones]
      summary: Delete a milestone
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  # --- DASHBOARD ---
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get today's summary for all twins
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
        - in: query
          name: date
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /onboarding/{userId}:
    get:
      operationId: getOnboarding
      tags: [onboarding]
      summary: Get onboarding record for a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Onboarding record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Onboarding"
        "404":
          description: No onboarding record found
    post:
      operationId: saveOnboarding
      tags: [onboarding]
      summary: Create or update onboarding answers
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveOnboardingBody"
      responses:
        "200":
          description: Saved onboarding record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Onboarding"
        "201":
          description: Created onboarding record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Onboarding"

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit in-app feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackBody"
      responses:
        "201":
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"

  /polls/active:
    get:
      operationId: getActivePoll
      tags: [polls]
      summary: Get the currently active poll and user response status
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Active poll with user response status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollWithResponse"
        "404":
          description: No active poll

  /polls/{id}/respond:
    post:
      operationId: respondToPoll
      tags: [polls]
      summary: Submit a response to a poll
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondToPollBody"
      responses:
        "201":
          description: Response recorded and results returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollWithResponse"
        "409":
          description: Already responded to this poll

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /polls/history:
    get:
      operationId: getPollHistory
      tags: [polls]
      summary: Get all polls with optional user response data
      parameters:
        - in: query
          name: userId
          schema:
            type: string
      responses:
        "200":
          description: List of polls ordered by most recent
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PollWithResponse"

  /admin/backfill-sheets:
    post:
      operationId: backfillSheetsOnboarding
      tags: [admin]
      summary: Backfill all onboarding records to Google Sheets
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backfill results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillResult"
        "403":
          description: Forbidden — admin only

  # --- TWIN AI ---
  /twin-ai/chat:
    post:
      operationId: twinAiChat
      tags: [twin-ai]
      summary: Send a message to Twin AI (streaming SSE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwinAiChatRequest"
      responses:
        "200":
          description: Server-sent events stream of AI response chunks
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Daily question limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /twin-ai/messages/{id}/feedback:
    patch:
      operationId: submitTwinAiMessageFeedback
      tags: [twin-ai]
      summary: Submit helpful or not helpful feedback on an AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwinAiMessageFeedbackRequest"
      responses:
        "204":
          description: Feedback recorded
        "404":
          description: Not found

  /app-updates:
    get:
      operationId: getAppUpdates
      tags: [app-updates]
      summary: Get app update history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: List of app updates newest-first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppUpdate"

  /admin/app-updates:
    post:
      operationId: createAppUpdate
      tags: [admin]
      summary: Create a new app update (admin only)
      parameters:
        - name: userId
          in: query
          schema:
            type: string
        - name: adminPassword
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppUpdateCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUpdate"
        "403":
          description: Forbidden

  /admin/app-updates/{id}:
    delete:
      operationId: deleteAppUpdate
      tags: [admin]
      summary: Delete an app update (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: string
        - name: adminPassword
          in: query
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
        "404":
          description: Not found

  /admin/twin-ai-analytics:
    get:
      operationId: getTwinAiAnalytics
      tags: [admin]
      summary: Get Twin AI usage analytics
      parameters:
        - name: userId
          in: query
          schema:
            type: string
        - name: adminPassword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Twin AI usage analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwinAiAnalytics"
        "403":
          description: Forbidden

