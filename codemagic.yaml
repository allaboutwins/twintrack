workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # iOS — App Store (TestFlight + App Store submission)
  # ─────────────────────────────────────────────────────────────────────────────
  ios-app-store:
    name: TwinTrack iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AppStore_API_Key   # Name this key in Codemagic dashboard → Teams → Integrations

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.allaboutwins.twintrack
      node: 20.19.2
      vars:
        BUNDLE_ID: com.allaboutwins.twintrack
        XCODE_WORKSPACE: artifacts/twintrack/ios/App/App.xcworkspace
        XCODE_SCHEME: App
        # Secret env vars — add these in Codemagic dashboard → your app → Environment variables:
        #   VITE_CLERK_PUBLISHABLE_KEY      — Clerk Dashboard → API Keys → pk_live_... key
        #   VITE_REVENUECAT_IOS_API_KEY     — RevenueCat Dashboard → project → API Keys → iOS public key (appl_...)
        #   VITE_PREMIUM_ENABLED            — false (keep off until subscriptions are ready)
        #
        # Do NOT add VITE_CLERK_PROXY_URL — must be absent for native iOS builds.
        #
        # Signing prereqs — complete these BEFORE triggering this workflow or it
        # will fail with "No matching profiles found for com.allaboutwins.twintrack":
        #   1. Codemagic → Teams → Integrations → App Store Connect → add key named AppStore_API_Key
        #   2. Codemagic → Teams → Code signing identities → iOS → Generate certificate (Apple Distribution)
        #   3. Provisioning profile is fetched automatically once the certificate exists

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@latest

      - name: Install workspace dependencies
        script: pnpm install --frozen-lockfile

      - name: Build web app
        script: |
          # BASE_PATH defaults to "/" in vite.config.ts when not set — correct for native builds
          pnpm --filter @workspace/twintrack run build

      - name: Add iOS platform (first build only — safe to re-run)
        script: |
          cd artifacts/twintrack
          npx cap add ios 2>/dev/null && echo "✅ iOS platform added" || echo "ℹ️  iOS platform already present"

      - name: Inject encryption compliance into Info.plist
        script: |
          PLIST="artifacts/twintrack/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          echo "✅ ITSAppUsesNonExemptEncryption = false (exempt — HTTPS/TLS only)"

      - name: Sync Capacitor (copy web assets + install CocoaPods)
        script: |
          cd artifacts/twintrack
          npx cap sync ios

      - name: Apply Xcode code-signing profiles
        script: xcode-project use-profiles

      - name: Increment build number from latest TestFlight
        script: |
          cd artifacts/twintrack/ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEXT=$((LATEST + 1))
          echo "Build number: $LATEST → $NEXT"
          agvtool new-version -all "$NEXT"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - your@email.com     # Replace with your email
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers  # Must match your TestFlight group name in App Store Connect

  # ─────────────────────────────────────────────────────────────────────────────
  # iOS — Development (quick builds for testing, no TestFlight upload)
  # ─────────────────────────────────────────────────────────────────────────────
  ios-development:
    name: TwinTrack iOS — Development
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.allaboutwins.twintrack
      node: 20.19.2
      vars:
        BUNDLE_ID: com.allaboutwins.twintrack
        XCODE_WORKSPACE: artifacts/twintrack/ios/App/App.xcworkspace
        XCODE_SCHEME: App

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@latest

      - name: Install workspace dependencies
        script: pnpm install --frozen-lockfile

      - name: Build web app
        script: pnpm --filter @workspace/twintrack run build

      - name: Add iOS platform
        script: |
          cd artifacts/twintrack
          npx cap add ios 2>/dev/null || true

      - name: Inject encryption compliance into Info.plist
        script: |
          PLIST="artifacts/twintrack/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

      - name: Sync Capacitor
        script: |
          cd artifacts/twintrack
          npx cap sync ios

      - name: Apply Xcode code-signing profiles
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  # ─────────────────────────────────────────────────────────────────────────────
  # Android — Google Play (internal track upload)
  # Runs on Linux — no Mac required, faster and cheaper than macOS builds
  # ─────────────────────────────────────────────────────────────────────────────
  android-google-play:
    name: TwinTrack Android — Google Play
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      groups:
        - google_play
      node: 20.19.2
      java: 17
      vars:
        PACKAGE_NAME: com.allaboutwins.twintrack
        # Secret env vars — add these in Codemagic dashboard → your app → Environment variables:
        #   CM_KEYSTORE                        — base64-encoded .jks keystore (Codemagic generates this for you)
        #   CM_KEYSTORE_PASSWORD               — keystore password you chose
        #   CM_KEY_ALIAS                       — key alias (e.g. "twintrack")
        #   CM_KEY_PASSWORD                    — key password you chose
        #   GCLOUD_SERVICE_ACCOUNT_CREDENTIALS — Google Play service account JSON (single line)
        #   VITE_API_URL                       — production server URL, e.g. https://twintrack.replit.app
        #                                        (REQUIRED for native — without it every API call fails)
        #   VITE_CLERK_PUBLISHABLE_KEY         — Clerk pk_live_... key
        #   VITE_REVENUECAT_ANDROID_API_KEY    — RevenueCat Android public key (starts with goog_)
        #   VITE_PREMIUM_ENABLED               — false (keep off until subscriptions are ready)

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@latest

      - name: Install workspace dependencies
        script: pnpm install --frozen-lockfile

      - name: Build web app
        script: |
          pnpm --filter @workspace/twintrack run build

      - name: Add Android platform (first build — safe to re-run)
        script: |
          cd artifacts/twintrack
          npx cap add android 2>/dev/null && echo "✅ Android platform added" || echo "ℹ️  Android platform already present"

      - name: Sync Capacitor (copy web assets into Android project)
        script: |
          cd artifacts/twintrack
          npx cap sync android

      - name: Set Android versionCode from Codemagic build number
        script: |
          python3 -c "
          import re, os
          vcode = os.environ.get('BUILD_NUMBER', '1')
          # Capacitor generates Groovy build.gradle (not .kts) — syntax: versionCode 1 (no equals sign)
          path = 'artifacts/twintrack/android/app/build.gradle'
          txt = open(path).read()
          txt = re.sub(r'versionCode\s+\d+', f'versionCode {vcode}', txt)
          open(path, 'w').write(txt)
          print(f'versionCode set to {vcode}')
          "

      - name: Decode keystore
        script: |
          printf '%s' "$CM_KEYSTORE" | base64 --decode > /tmp/twintrack.keystore
          echo "✅ Keystore ready"

      - name: Build signed release AAB
        script: |
          cd artifacts/twintrack/android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/twintrack.keystore \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

      # TEMPORARY DEBUG STEP — remove once GCLOUD_SERVICE_ACCOUNT_CREDENTIALS is confirmed loaded.
      # Only prints the character length, never the credential contents.
      - name: Debug — verify GCLOUD_SERVICE_ACCOUNT_CREDENTIALS is loaded
        script: |
          echo "GCLOUD length:"
          echo ${#GCLOUD_SERVICE_ACCOUNT_CREDENTIALS}
          if [ -z "$GCLOUD_SERVICE_ACCOUNT_CREDENTIALS" ]; then
            echo "❌ GCLOUD_SERVICE_ACCOUNT_CREDENTIALS is EMPTY at build runtime — the google_play group is not being loaded, or the variable inside it is empty/misnamed."
          else
            echo "✅ GCLOUD_SERVICE_ACCOUNT_CREDENTIALS is present at build runtime."
          fi

    artifacts:
      - artifacts/twintrack/android/app/build/outputs/**/*.aab
      - artifacts/twintrack/android/app/build/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - your@email.com     # Replace with your email
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
